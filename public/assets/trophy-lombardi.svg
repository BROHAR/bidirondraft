<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" style="image-rendering:pixelated">

  <!-- ==========================================================
       LOMBARDI TROPHY — pixel art, silver chrome
       Tall horizontal football (32w x 18h, ~1.8:1 ratio), narrow
       triangular pyramid pedestal (40 rows tall, base only 38w).
       ========================================================== -->

  <!-- ===== FOOTBALL (32 wide x 18 tall) ===== -->
  <g fill="#c8c8c8">
    <rect x="30" y="2"  width="4"  height="1"/>
    <rect x="28" y="3"  width="8"  height="1"/>
    <rect x="26" y="4"  width="12" height="1"/>
    <rect x="24" y="5"  width="16" height="1"/>
    <rect x="22" y="6"  width="20" height="1"/>
    <rect x="20" y="7"  width="24" height="1"/>
    <rect x="18" y="8"  width="28" height="1"/>
    <rect x="16" y="9"  width="32" height="4"/>
    <rect x="18" y="13" width="28" height="1"/>
    <rect x="20" y="14" width="24" height="1"/>
    <rect x="22" y="15" width="20" height="1"/>
    <rect x="24" y="16" width="16" height="1"/>
    <rect x="26" y="17" width="12" height="1"/>
    <rect x="28" y="18" width="8"  height="1"/>
    <rect x="30" y="19" width="4"  height="1"/>
  </g>

  <!-- football top-left highlight -->
  <g fill="#efefef">
    <rect x="30" y="2"  width="2" height="1"/>
    <rect x="28" y="3"  width="4" height="1"/>
    <rect x="26" y="4"  width="6" height="1"/>
    <rect x="24" y="5"  width="8" height="1"/>
    <rect x="22" y="6"  width="8" height="1"/>
    <rect x="20" y="7"  width="8" height="1"/>
    <rect x="18" y="8"  width="8" height="1"/>
    <rect x="16" y="9"  width="6" height="2"/>
  </g>

  <!-- football bottom-right shadow -->
  <g fill="#8a8a8a">
    <rect x="32" y="19" width="2" height="1"/>
    <rect x="32" y="18" width="4" height="1"/>
    <rect x="34" y="17" width="4" height="1"/>
    <rect x="36" y="16" width="4" height="1"/>
    <rect x="38" y="15" width="4" height="1"/>
    <rect x="40" y="14" width="4" height="1"/>
    <rect x="42" y="13" width="4" height="1"/>
    <rect x="42" y="9"  width="6" height="4"/>
  </g>

  <!-- football horizontal seam -->
  <rect x="18" y="10" width="28" height="1" fill="#4a4a4a"/>

  <!-- laces — 5 vertical white ticks crossing the seam -->
  <g fill="#ffffff">
    <rect x="25" y="8"  width="1" height="5"/>
    <rect x="28" y="8"  width="1" height="5"/>
    <rect x="31" y="8"  width="1" height="5"/>
    <rect x="34" y="8"  width="1" height="5"/>
    <rect x="37" y="8"  width="1" height="5"/>
  </g>

  <!-- ===== TINY NECK between football and pedestal ===== -->
  <rect x="30" y="20" width="4" height="2" fill="#c8c8c8"/>
  <rect x="30" y="20" width="2" height="2" fill="#efefef"/>
  <rect x="32" y="20" width="2" height="2" fill="#8a8a8a"/>

  <!-- ===========================================================
       PYRAMID PEDESTAL — narrow, ~38w base, 10 stripes of 4 rows.
       Apex 6w → base 38w. Lit-from-upper-left: left face bright,
       right face shadow, dark vertical center seam.
       =========================================================== -->

  <!-- LEFT face (lit) -->
  <g fill="#efefef">
    <rect x="29" y="22" width="3"  height="4"/>
    <rect x="27" y="26" width="5"  height="4"/>
    <rect x="26" y="30" width="6"  height="4"/>
    <rect x="24" y="34" width="8"  height="4"/>
    <rect x="22" y="38" width="10" height="4"/>
    <rect x="21" y="42" width="11" height="4"/>
    <rect x="19" y="46" width="13" height="4"/>
    <rect x="17" y="50" width="15" height="4"/>
    <rect x="16" y="54" width="16" height="4"/>
    <rect x="14" y="58" width="18" height="4"/>
  </g>

  <!-- RIGHT face (shadow) -->
  <g fill="#8a8a8a">
    <rect x="32" y="22" width="3"  height="4"/>
    <rect x="32" y="26" width="5"  height="4"/>
    <rect x="32" y="30" width="6"  height="4"/>
    <rect x="32" y="34" width="8"  height="4"/>
    <rect x="32" y="38" width="10" height="4"/>
    <rect x="32" y="42" width="11" height="4"/>
    <rect x="32" y="46" width="13" height="4"/>
    <rect x="32" y="50" width="15" height="4"/>
    <rect x="32" y="54" width="16" height="4"/>
    <rect x="32" y="58" width="18" height="4"/>
  </g>

  <!-- vertical seam where the two faces meet -->
  <rect x="31" y="22" width="2" height="40" fill="#2c2c2c"/>

  <!-- emblem plate on lower pedestal -->
  <rect x="27" y="46" width="10" height="9" fill="#1a1a1a"/>
  <rect x="29" y="48" width="6"  height="1" fill="#c8c8c8"/>
  <rect x="29" y="52" width="6"  height="1" fill="#c8c8c8"/>
  <rect x="31" y="48" width="2"  height="5" fill="#efefef"/>

  <!-- pyramid base shadow rim -->
  <rect x="14" y="62" width="36" height="1" fill="#1a1a1a"/>

</svg>
